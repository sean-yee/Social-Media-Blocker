<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Blocker Settings</title>
  <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>
  
  <div class="header">
    <h2>Lock In Settings</h2>
  </div>

  <div class="site-list">
    <label><input type="checkbox" id="tiktok"> TikTok</label>
    <label><input type="checkbox" id="instagram"> Instagram</label>
    <label><input type="checkbox" id="x"> X (Twitter)</label>
    <label><input type="checkbox" id="snapchat"> Snapchat</label>
    <label><input type="checkbox" id="twitch"> Twitch</label>
    <label><input type="checkbox" id="youtube"> Youtube</label>
  </div>

  <div id="custom-sites-list" class="site-list" style="margin-top: 10px;"></div>

  <div class="add-site-container" style="margin-top: 15px; display: flex; gap: 8px;">
    <input type="text" id="new-site-input" placeholder="e.g., linkedin.com" style="flex: 1; padding: 6px; border-radius: 4px; border: none;">
    <button id="add-site-btn" style="padding: 6px 12px; background-color: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer;">Add</button>
  </div>

  <hr>
  
  <div id="stats">Loading stats...</div>

  <script src="popup.js"></script>
</body>
</html>
